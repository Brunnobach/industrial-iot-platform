services:
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: iiot_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - iiot_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 3

  influxdb:
    image: influxdb:2.7-alpine
    container_name: iiot_influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=iiot
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=adminpassword
      - INFLUXDB_USER=iiot
      - INFLUXDB_USER_PASSWORD=iiotpassword
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=iiot-token
      - DOCKER_INFLUXDB_INIT_ORG=iiot-org
      - DOCKER_INFLUXDB_INIT_BUCKET=iiot-bucket
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - iiot_network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.9
    container_name: iiot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - iiot_network
    depends_on:
      influxdb:
        condition: service_healthy

  ingestion:
    build: .
    container_name: iiot_ingestion
    command: python -m ingestion.mqtt_to_influx
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=iiot-token
      - INFLUX_ORG=iiot-org
      - INFLUX_BUCKET=iiot-bucket
    networks:
      - iiot_network
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  api:
    build: .
    container_name: iiot_api
    ports:
      - "8000:8000"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=iiot-token
      - INFLUX_ORG=iiot-org
      - INFLUX_BUCKET=iiot-bucket
    networks:
      - iiot_network
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  simulator:
    build: .
    container_name: iiot_simulator
    command: python -m simulator.sensor_simulator
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - SIM_INTERVAL=1.0
    networks:
      - iiot_network
    depends_on:
      mosquitto:
        condition: service_healthy

volumes:
  influxdb_data:
  grafana_data:
  mosquitto_data:

networks:
  iiot_network:
    driver: bridge
